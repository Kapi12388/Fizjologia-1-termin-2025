<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizjologia 2025 - Opal Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-opal: linear-gradient(135deg, #ffffff 0%, #fff9f9 25%, #fdfbf7 50%, #f5f7fa 75%, #ffffff 100%);
            --glass-white: rgba(255, 255, 255, 0.6);
            --border-pearl: rgba(255, 255, 255, 0.8);
            --powder: #fce4ec;
            --beige: #f5f5dc;
            --txt: #4a4a4a;
            --accent: #d1d9e6;
            --correct: #81c784;
            --wrong: #ef9a9a;
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-opal);
            background-size: 400% 400%;
            animation: opalFlow 20s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--txt);
            overflow-x: hidden;
        }

        @keyframes opalFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app-container {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--border-pearl);
            border-radius: 35px;
            padding: 40px;
            width: 100%;
            max-width: 750px;
            box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff;
            position: relative;
            transition: all 0.5s ease;
        }

        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.03);
            border-radius: 35px 35px 0 0;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--powder), var(--beige), white);
            transition: width 0.6s ease;
        }

        .q-header { font-size: 0.8rem; font-weight: 600; opacity: 0.5; margin-bottom: 10px; letter-spacing: 2px; }
        
        .q-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 30px; line-height: 1.5; animation: blurIn 0.5s ease forwards; }

        @keyframes blurIn {
            from { filter: blur(10px); opacity: 0; transform: translateY(10px); }
            to { filter: blur(0); opacity: 1; transform: translateY(0); }
        }

        .options-grid { display: grid; gap: 12px; }

        .opt-btn {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 18px 25px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            text-align: left;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.02);
        }

        .opt-btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 4px 4px 15px rgba(0,0,0,0.05); }

        .opt-btn.active { background: white; border-color: var(--powder); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05); font-weight: 600; }

        .main-btn {
            margin-top: 30px;
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: white;
            color: #777;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 5px 5px 15px #d1d9e6, -5px -5px 15px #ffffff;
            transition: 0.3s;
        }

        .main-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .main-btn:hover:not(:disabled) { transform: scale(1.01); color: #333; }

        #fb-box {
            margin-top: 25px;
            padding: 25px;
            border-radius: 25px;
            display: none;
            font-size: 0.9rem;
            line-height: 1.6;
            animation: fadeIn 0.4s ease;
        }

        .fb-correct { background: rgba(129, 199, 132, 0.15); border: 1px solid var(--correct); }
        .fb-wrong { background: rgba(239, 154, 154, 0.15); border: 1px solid var(--wrong); }

        #results { text-align: center; display: none; }
        .score-num { font-size: 4rem; font-weight: 700; color: var(--powder); text-shadow: 2px 2px 4px rgba(0,0,0,0.05); }
        .error-log { text-align: left; margin-top: 30px; max-height: 300px; overflow-y: auto; padding-right: 10px; }
        .error-item { padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.85rem; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--powder); border-radius: 10px; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="progress-container"><div id="progress-fill"></div></div>
    
    <div id="quiz-ui">
        <div class="q-header" id="q-meta"></div>
        <div class="q-text" id="q-txt"></div>
        <div class="options-grid" id="opt-list"></div>
        <button class="main-btn" id="action-btn" onclick="handleFlow()" disabled>SPRAWDŹ</button>
        <div id="fb-box"></div>
    </div>

    <div id="results">
        <h2>WYNIK TESTU</h2>
        <div class="score-num" id="final-pct"></div>
        <div id="score-text"></div>
        <div class="error-log" id="err-list"></div>
        <button class="main-btn" onclick="location.reload()">POWTÓRZ TEST</button>
    </div>
</div>

<script>

        { q: "Wskaż błędne o układzie limbicznym:", a: ["zespół Korsakowa to amnezja", "usunięcie ciała migdałowatego powoduje lęk", "brak hipokampa - brak pamięci długotrwałej", "hipokamp tworzy wspomnienia"], c: 1, e: "BŁĄD: Usunięcie ciała migdałowatego powoduje oswojenie i brak strachu, nie lęk." },
        { q: "Mięśnie gładkie jednostkowe:", a: ["brak automatyzmu", "wykazują automatyzm dzięki komórkom rozrusznikowym", "są obficie unerwione", "mają dużą precyzję"], c: 1, e: "Są to mięśnie typu trzewnego z własnym rozrusznikiem." },
        { q: "Co najbardziej hamuje motorykę żołądka?", a: ["acetylocholina", "gastryna", "noradrenalina", "VIP"], c: 2, e: "Noradrenalina to mediator współczulny hamujący trawienie." },

        { q: "Hipotonia -> choroba nerek:", a: ["spadek klirensu kreatyniny", "poliuria", "hipernatremia", "zasadowica"], c: 0, e: "Spadek GFR." },
        { q: "Bufor erytrocytu:", a: ["deoksyhemoglobina", "oksyhemoglobina", "fosforan", "białczan"], c: 0, e: "Wiąże jony H+." },
        { q: "Spadek pCO2 w krwi żylnej:", a: ["kwasica oddechowa", "zasadowica oddechowa", "wysiłek", "gorączka"], c: 1, e: "Efekt hiperwentylacji." },
        { q: "Najwyższy PPM:", a: ["ciąża (2 tr)", "dieta białkowa", "wysiłek", "sen"], c: 0, e: "Znaczny wzrost metabolizmu." },
        { q: "Łożyskowy 'hormon wzrostu':", a: ["hPL (somatomammotropina)", "hCG", "estriol", "progesteron"], c: 0, e: "Reguluje metabolizm matki." },
        { q: "pO2 100 vs 95 to:", a: ["norma", "przeciek", "hipowentylacja", "blok"], c: 0, e: "Gradient fizjologiczny." },
        { q: "Podwzgórze wydziela:", a: ["GnRH", "TSH", "Prolaktynę", "GH"], c: 0, e: "Podwzgórze uwalnia liberyny." },
        { q: "Pęcherzykowe pO2 = ciśnieniu w:", a: ["tętniczej", "żylnej", "kapilarach płucnych", "tętnicy płucnej"], c: 2, e: "Tam zachodzi równowaga." },
        { q: "Kwasica metaboliczna (nerki) kompensacja:", a: ["szybszy oddech", "wolniejszy oddech", "chlor", "bikarbonat"], c: 0, e: "Usuwanie CO2." },
        { q: "Pozaoddechowa funkcja płuc:", a: ["bradykinina", "Ang II", "surfaktant", "wszystkie"], c: 3, e: "Funkcje metaboliczne." },
        { q: "Tył podwzgórza:", a: ["hipertermia", "senność", "hiperfagia", "moczówka"], c: 0, e: "Ośrodek zatrzymywania ciepła." },
        { q: "Synapsa hamująca otwiera kanały:", a: ["Cl", "Na", "Ca", "K napięciozależne"], c: 0, e: "Wydzielanie GABA/Glicyny." },
        { q: "Receptory neuronu są na:", a: ["dendrytach i somie", "aksonie", "kolbce", "brak"], c: 0, e: "Obszary bezmielinowe." },
        { q: "Bloker Na w sercu:", a: ["faza 0", "plateau", "automatyzm", "repolaryzacja"], c: 0, e: "Hamuje depolaryzację." },
        { q: "VO2max NIE zależy od:", a: ["produkcji CO2", "pojemności minutowej", "Hb", "kapilar"], c: 0, e: "Produkcja to skutek." },
        { q: "Ślina spada przy:", a: ["strachu", "żuciu", "nudnościach", "smaku"], c: 0, e: "Działanie współczulne." },
        { q: "M. gładki prawdziwe:", a: ["miozyna dłuższa", "brak miozyny", "brak aktyny", "brak tropomiozyny"], c: 0, e: "Budowa filamentów." },
        { q: "Wibracje krzyżują się w:", a: ["rdzeniu przedłużonym", "rdzeniu kręgowym", "moście", "wzgórzu"], c: 0, e: "Drogi sznurów tylnych." },
        { q: "Hipokamp uszkodzony to amnezja:", a: ["następcza", "wsteczna", "operacyjna", "krótkotrwała"], c: 0, e: "Brak konsolidacji." },
        { q: "Bramka bólowa (rozcieranie):", a: ["włókna A-beta", "włókna C", "kora", "rdzeń przedłużony"], c: 0, e: "Stymulacja czucia dotyku." },
        { q: "Próg tlenowy to:", a: ["wzrost wentylacji nieliniowy", "spadek CO2", "tętno max", "VO2max"], c: 0, e: "Przez buforowanie kwasu." },
        { q: "Uszkodzenie prawej drogi korowo-rdzeniowej w rdzeniu:", a: ["prawostronne spastyczne poniżej", "lewo", "temp", "ból"], c: 0, e: "Poniżej skrzyżowania." },
        { q: "Wapń w m. szkieletowym wiąże:", a: ["troponina", "kalmodulina", "tropomiozyna", "aktyna"], c: 0, e: "Wapń wiąże TnC." },
        { q: "Pytanie o kompensację kwasicy metabolicznej:", a: ["oddech Kussmaula", "płytki oddech", "brak zmian", "zasadowica"], c: 0, e: "Zwiększenie wentylacji." }
    ];

    let current = 0;
    let score = 0;
    let userSel = null;
    let isReview = false;
    let errors = [];

    function update() {
        isReview = false;
        userSel = null;
        document.getElementById('action-btn').disabled = true;
        document.getElementById('action-btn').innerText = "SPRAWDŹ";
        document.getElementById('fb-box').style.display = "none";
        
        const q = questions[current];
        document.getElementById('q-meta').innerText = `PYTANIE ${current + 1} Z ${questions.length}`;
        document.getElementById('q-txt').innerText = q.q;
        document.getElementById('progress-fill').style.width = `${(current / questions.length) * 100}%`;
        
        const list = document.getElementById('opt-list');
        list.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'opt-btn';
            btn.innerText = `${String.fromCharCode(97 + i)}. ${opt}`;
            btn.onclick = () => select(i, btn);
            list.appendChild(btn);
        });
    }

    function select(idx, el) {
        if(isReview) return;
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        userSel = idx;
        document.getElementById('action-btn').disabled = false;
    }

    function handleFlow() {
        if(!isReview) {
            check();
        } else {
            current++;
            if(current < questions.length) update();
            else showResults();
        }
    }

    function check() {
        isReview = true;
        const q = questions[current];
        const isCorrect = userSel === q.c;
        const fb = document.getElementById('fb-box');
        fb.style.display = "block";
        
        if(isCorrect) {
            score++;
            fb.className = "fb-correct";
            fb.innerHTML = `<strong>DOBRZE!</strong><br><small>${q.e}</small>`;
        } else {
            fb.className = "fb-wrong";
            fb.innerHTML = `<strong>BŁĄD.</strong><br>Poprawna: ${String.fromCharCode(97+q.c)}. ${q.a[q.c]}<br><small>${q.e}</small>`;
            errors.push({n: current+1, q: q.q, c: q.a[q.c]});
        }
        document.getElementById('action-btn').innerText = "DALEJ";
    }

    function showResults() {
        document.getElementById('quiz-ui').style.display = "none";
        document.getElementById('results').style.display = "block";
        document.getElementById('progress-fill').style.width = "100%";
        const pct = (score / questions.length * 100).toFixed(1);
        document.getElementById('final-pct').innerText = `${pct}%`;
        document.getElementById('score-text').innerText = `Twoja liczba punktów: ${score} z ${questions.length}`;
        
        const errList = document.getElementById('err-list');
        if(errors.length > 0) {
            errList.innerHTML = '<h3>TWOJE BŁĘDY:</h3>';
            errors.forEach(e => {
                errList.innerHTML += `<div class="error-item"><strong>Pytanie ${e.n}:</strong> ${e.q}<br><span style="color:#81c784">Poprawna: ${e.c}</span></div>`;
            });
        } else {
            errList.innerHTML = "<h3>PERFEKCYJNIE!</h3>";
        }
    }

    update();
</script>
